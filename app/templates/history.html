{% extends "base.html" %}

{% block title %}Analysis History - AI Web Analyzer{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">Analysis History</h1>
        <a href="/" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium transition">New Analysis</a>
    </div>

    <!-- Search -->
    <div class="mb-6">
        <input
            type="text"
            id="history-search"
            placeholder="Search by URL..."
            class="w-full sm:w-96 px-4 py-2 border border-gray-200 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition"
        >
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:text-gray-700" onclick="sortHistory('url')">URL</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:text-gray-700" onclick="sortHistory('overall_score')">Score</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:text-gray-700" onclick="sortHistory('timestamp')">Date</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                </tr>
            </thead>
            <tbody id="history-tbody" class="bg-white divide-y divide-gray-200">
            </tbody>
        </table>
        <div id="history-empty" class="hidden text-center py-12 text-gray-400">
            <p>No analyses yet. <a href="/" class="text-blue-600 hover:underline">Start your first analysis</a></p>
        </div>
    </div>

    <!-- Pagination -->
    <div id="history-pagination" class="flex justify-center mt-6 gap-2"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/history.js') }}"></script>
{% endblock %}
